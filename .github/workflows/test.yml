name: VisionDX API Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # If you need external services like Redis/Postgres, add them here
      # For now, we use SQLite in-memory for testing
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx mock aiosqlite sqlalchemy loguru passlib pytest-mock jose
        
    - name: Run tests
      run: |
        pytest tests/
      env:
        SECRET_KEY: test-secret-key
        ALGORITHM: HS256
        APP_ENV: testing
