# =============================================================
# render.yaml — VisionDX Full Deployment Blueprint
# =============================================================
# Deploy steps:
#   1. Push this repo to GitHub
#   2. Go to https://dashboard.render.com → New → Blueprint
#   3. Select your repo → Render auto-reads this file
#   4. Click "Apply" — both services deploy automatically
# =============================================================

services:

  # ────────────────────────────────────────────────────────────
  # SERVICE 1: Backend API  (FastAPI + Uvicorn)
  # URL: https://visiondx-api.onrender.com
  # ────────────────────────────────────────────────────────────
  - type: web
    name: visiondx-api
    runtime: python
    region: singapore          # Singapore = lowest latency for India
    plan: free                 # free = sleeps after 15min idle
                               # upgrade to 'starter' ($7/mo) for always-on
    pythonVersion: "3.11"

    buildCommand: |
      set -e
      echo "=== Installing system dependencies ==="
      apt-get update -q && apt-get install -y --no-install-recommends \
        tesseract-ocr \
        tesseract-ocr-eng \
        tesseract-ocr-hin \
        poppler-utils \
        libgl1 \
        libglib2.0-0
      echo "=== Installing Python packages ==="
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
      pip install pyarrow
      echo "=== Creating directories ==="
      mkdir -p /tmp/uploads /tmp/models
      echo "=== Build complete ==="

    startCommand: |
      python -m visiondx.startup && \
      uvicorn visiondx.main:app \
        --host 0.0.0.0 \
        --port $PORT \
        --workers 1 \
        --loop uvloop \
        --log-level info

    healthCheckPath: /api/v1/ping

    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////tmp/visiondx.db
      - key: DATABASE_URL_SYNC
        value: sqlite:////tmp/visiondx.db
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates secure random value
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: "*"                   # Set to your frontend URL after first deploy
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: MODEL_PATH
        value: /tmp/models/disease_predictor.pkl
      - key: TESSERACT_CMD
        value: /usr/bin/tesseract
      - key: MAX_UPLOAD_SIZE_MB
        value: "20"
      - key: LOG_LEVEL
        value: INFO
      - key: REDIS_URL
        value: redis://localhost:6379/0   # optional — not required for basic deployment

    autoDeploy: true

  # ────────────────────────────────────────────────────────────
  # SERVICE 2: Frontend  (Next.js)
  # URL: https://visiondx-app.onrender.com
  # ────────────────────────────────────────────────────────────
  - type: web
    name: visiondx-frontend
    runtime: node
    region: singapore
    plan: free
    nodeVersion: "20"

    buildCommand: |
      set -e
      cd frontend
      npm ci --prefer-offline
      npm run build
      echo "=== Frontend build complete ==="

    startCommand: |
      cd frontend && node server.js

    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://visiondx-api.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"

    autoDeploy: true
