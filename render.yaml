services:

# ============================================================
# Backend API — FastAPI
# ============================================================
- type: web
  name: visiondx-api-vdzv-qomz
  runtime: python
  region: singapore
  plan: free

  buildCommand: |
    set -e

    echo "=== Installing system dependencies ==="
    apt-get update -q && apt-get install -y --no-install-recommends \
      tesseract-ocr \
      tesseract-ocr-eng \
      tesseract-ocr-hin \
      poppler-utils \
      libgl1 \
      libglib2.0-0

    echo "=== Installing Python packages ==="
    pip install --upgrade pip setuptools wheel
    pip install -r requirements.txt
    pip install pyarrow

    echo "=== Creating runtime directories ==="
    mkdir -p /tmp/uploads
    mkdir -p /tmp/models

    echo "=== Backend build complete ==="

  startCommand: |
    python -m visiondx.startup && \
    uvicorn visiondx.main:app \
      --host 0.0.0.0 \
      --port $PORT \
      --workers 1 \
      --log-level info

  healthCheckPath: /api/v1/ping

  envVars:
    - key: PYTHON_VERSION
      value: 3.11.9

    - key: DATABASE_URL
      value: sqlite+aiosqlite:////tmp/visiondx.db

    - key: DATABASE_URL_SYNC
      value: sqlite:////tmp/visiondx.db

    - key: SECRET_KEY
      generateValue: true

    - key: APP_ENV
      value: production

    - key: DEBUG
      value: "false"

    - key: ALLOWED_ORIGINS
      value: "https://visiondx-frontend-vdzv-qomz.onrender.com"

    - key: UPLOAD_DIR
      value: /tmp/uploads

    - key: MODEL_PATH
      value: /tmp/models/disease_predictor.pkl

    - key: TESSERACT_CMD
      value: /usr/bin/tesseract

    - key: MAX_UPLOAD_SIZE_MB
      value: "20"

    - key: LOG_LEVEL
      value: INFO

  autoDeploy: true


# ============================================================
# Frontend — Next.js
# ============================================================
- type: web
  name: visiondx-frontend-vdzv-qomz
  runtime: node
  region: singapore
  plan: free

  buildCommand: |
    set -e
    echo "=== Installing frontend dependencies ==="
    cd frontend
    npm install --include=dev
    echo "=== Building Next.js app ==="
    npm run build
    echo "=== Frontend build complete ==="

  startCommand: |
    cd frontend && npm start

  envVars:
    - key: NODE_VERSION
      value: 20.11.1

    - key: NEXT_PUBLIC_API_URL
      value: https://visiondx-api-vdzv-qomz.onrender.com

    - key: NODE_ENV
      value: production

    - key: PORT
      value: "3000"

  autoDeploy: true