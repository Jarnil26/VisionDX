worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Limit request body size (20 MB for PDF uploads)
    client_max_body_size 20M;

    upstream visiondx_api {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # API routes
        location /api/ {
            proxy_pass http://visiondx_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Health check
        location /health {
            proxy_pass http://visiondx_api/health;
        }

        # Docs
        location /docs {
            proxy_pass http://visiondx_api/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://visiondx_api/openapi.json;
        }

        # Default
        location / {
            proxy_pass http://visiondx_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
